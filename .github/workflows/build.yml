name: Build Windows & Mac

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --name PDFAnonymizer --windowed --onefile --add-data "src;src" src/main.py

      - name: Verify build output
        run: |
          dir dist\
          dir dist\PDFAnonymizer.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFAnonymizer-Windows
          path: dist/PDFAnonymizer.exe

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build app with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --name PDFAnonymizer --windowed --onefile --add-data "src:src" src/main.py

      - name: Create ZIP for distribution
        run: |
          cd dist && zip -r PDFAnonymizer-Mac.zip PDFAnonymizer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFAnonymizer-Mac
          path: dist/PDFAnonymizer-Mac.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: PDFAnonymizer-Windows
          path: artifacts/

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: PDFAnonymizer-Mac
          path: artifacts/

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "PDF Anonymizer - Download"
          body: |
            ## PDF Anonymizer

            **Downloads:**
            - **Windows:** `PDFAnonymizer.exe` herunterladen und starten
            - **Mac:** `PDFAnonymizer-Mac.zip` herunterladen, entpacken und starten

            Dieser Release wird bei jedem Push automatisch aktualisiert.

            ---

            ### Voraussetzungen
            - Windows 10/11 oder macOS 12+
                        - Ein API-Key fuer OpenAI (GPT-5.4)
            - PDFs muessen Texterkennung (OCR) enthalten

            ### Erste Schritte
            1. Programm starten
            2. Einstellungen oeffnen, API-Key hinterlegen
            3. PDF per Drag & Drop ablegen, Speicherort waehlen, fertig!
          files: |
            artifacts/PDFAnonymizer.exe
            artifacts/PDFAnonymizer-Mac.zip
          draft: false
          prerelease: false
          make_latest: true
